services:
  backend:
    build: .
    ports:
      - 3000:3000
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USERNAME: admin
      DB_PASSWORD: admin
      DB_NAME: insta_backend
      CACHE_TTL: 60000
      CACHE_MAX: 100
      UPLOAD_DIR: ./uploads
      UPLOAD_MAX_FILE_SIZE_MB: 15
      UPLOAD_MAX_FILES: 10
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      database:
        condition: service_healthy

  database:
    image: "postgres:17"
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: insta_backend
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d insta_backend"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  uploads_data: